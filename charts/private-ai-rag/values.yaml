global:
  # This is used to allow insecure images to be pulled from the bitnamilegacy registry
  security:
    allowInsecureImages: true
  enableSSO: false
  extraEnvVarsCM: shared-configmap-rag
  extraEnvVarsSecret: shared-secrets-rag
  googleApplicationCredentialsSecretRef: # user provided
  awsOpenAIKeySecretRef: # user provided
  sendgridSecretRef: "sendgrid-secret"
  postgresql:
    auth:
      username: postgres
      existingSecret: postgresql-password
      secretKeys:
        adminPasswordKey: postgresPassword
  llmBaseUrl: http://open-webui-ollama:11434
  secretArgocdHook: Skip
  nodeEnv: production
  juiceFsUrl: # system provided
  jiraSelfHosted: false
  confluenceSelfHosted: false
dataIngestion:
  enabled: false
  config:
    dataSourcesUrl:
    overideWebSocketUrl:
    dataIngestionCredentialsRef:
    serviceUrl: # system provided
ingress:
  enabled: true
  ignoreSSL: false
  increaseBuffersSize: false
  class: nginx
  oauthProviderName:
  oauth2Proxy:
    enabled: true
    adminEmail: "admin@nethopper.io"
    skipAuthPaths:
      - /api/v1/models
      - /api/v1/chat/completions
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/backend-protocol: http
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/tls-acme: "true"
  host:
  additionalHosts: []
  tls:
    - hosts:
open-webui:
  fullnameOverride: "open-webui"
  resources:
    requests:
      cpu: 50m
      memory: 768Mi
    limits:
      cpu: 500m
      memory: 1536Mi
  image:
    repository: nethopper/kaops-open-webui
    tag: "v1.107.0-slim"
    pullPolicy: IfNotPresent
  ollama:
    fullnameOverride: "open-webui-ollama"
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 4000m
        memory: 8Gi
    persistentVolume:
      enabled: true
    ollama:
      gpu:
        enabled: false
      models:
        pull: []
    service:
      type: ClusterIP
  pipelines:
    fullnameOverride: "open-webui-pipelines"
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    # Override default PIPELINES_URLS to prevent downloading example pipelines
    extraEnvVars: []
    # Init container to selectively copy enabled pipelines and remove disabled ones
    extraInitContainers:
      - name: copy-custom-pipelines
        image: busybox:1.37
        command: ["sh", "/pipeline-source/manage-pipelines.sh"]
        volumeMounts:
          - name: pipeline-files
            mountPath: /pipeline-source
          - name: data
            mountPath: /app/pipelines
    volumes:
      - name: pipeline-files
        configMap:
          name: custom-pipelines-config
          optional: true
  extraEnvFrom:
    - configMapRef:
        name: shared-configmap-rag
  extraEnvVars:
    - name: WEBUI_NAME
      value: "Private AI"
    - name: ENABLE_CODE_EXECUTION
      value: "false"
    - name: ENABLE_CODE_INTERPRETER
      value: "false"
    - name: ENABLE_EVALUATION_ARENA_MODELS
      value: "false"
    - name: ENABLE_GOOGLE_DRIVE_INTEGRATION
      value: "true"
    - name: ENABLE_ONEDRIVE_INTEGRATION
      value: "true"
    - name: BYPASS_EMBEDDING_AND_RETRIEVAL
      value: "true"
    - name: BYPASS_MODEL_ACCESS_CONTROL
      value: "true"
    - name: USER_PERMISSIONS_WORKSPACE_KNOWLEDGE_ACCESS
      value: "true"
    - name: USER_PERMISSIONS_CHAT_CONTROLS
      value: "false"
    - name: USER_PERMISSIONS_WORKSPACE_PROMPTS_ACCESS
      value: "true"
    - name: WEBUI_AUTH
      value: "true"
    - name: API_KEY_ALLOWED_ENDPOINTS
      value: /api/v1/knowledge/,/api/v1/knowledge/list
    - name: WEBUI_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: shared-secrets-rag
          key: JWT_SECRET_KEY
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: shared-secrets-rag
          key: DATABASE_URL
    - name: JUICEFS_S3_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: juicefs-s3-gateway
          key: minio-root-user
    - name: JUICEFS_S3_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: juicefs-s3-gateway
          key: minio-root-password
    - name: JUICEFS_S3_BUCKET
      valueFrom:
        secretKeyRef:
          name: juicefs-s3-gateway
          key: name
  copyAppData:
    command:
      - sh
      - "-c"
      - >-
        if [ "$(ls -A /app/backend/data 2>/dev/null)" ]; then cp -r
        /app/backend/data/* /tmp/app-data/; else echo 'No data to copy,
        directory is empty'; fi
postgresql:
  image:
    repository: bitnamilegacy/postgresql
  metrics:
    image:
      repository: bitnamilegacy/postgres-exporter
    enabled: true
    serviceMonitor:
      enabled: true
      labels:
        release: # system provided
  primary:
    resourcesPreset: none
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi
    initdb:
      scripts:
        01-init.sql: |
          CREATE DATABASE "open-webui" WITH OWNER postgres;
          CREATE DATABASE "private-ai-rag" WITH OWNER postgres;
          CREATE DATABASE "private-ai-rest" WITH OWNER postgres;
          CREATE DATABASE "juicefs" WITH OWNER postgres;
rag:
  allowedExtensions: "pdf,docx,xlsx,pptx,txt,json,md,csv,html"
  custom:
    {}
    # logo: # user provided
    # bgImageAuth: # user provided
    # bgMovieAuth: # user provided
    # sector:  # user provided
  dataServiceUrl: # user provided
  dataServiceUrlBackend: # user provided
  ragApiUrl: # user provided
  allowedCorsOrigin: # system provided
  # googleAllowedExtensions: # user provided
  gcsBucketName: # user provided
  googleApiScopes: # system provided
  postgresHost: # system provided

initdb:
  enabled: false
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  postgresql:
    port: "5432"
    database: "postgres"
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

postInstall:
  chosenPostInstallOptions: "suggested"

backups:
  enabled: false
  schedule: "0 */8 * * *"
  # For GCS backups:
  # gcsBucketName: # user provided
  # googleApplicationCredentialsSecretRef: defaults to global.googleApplicationCredentialsSecretRef
  # For S3 backups:
  # s3BucketName: # user provided
  # s3Region: # user provided (e.g., us-east-1)
  # s3AccessKeySecretRef: # user provided (secret name containing AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY) - not needed if using serviceAccountName
  # serviceAccountName: # user provided (for IRSA/service account based authentication instead of access keys)
  type: gcs # Options: gcs, s3

nh-rag-api:
  enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 1536Mi
    limits:
      cpu: 1000m
      memory: 3Gi
  image:
    tag: "v1.107.1"
  env:
    LLAMAINDEX_OLLAMA_BASE_URL: http://open-webui-ollama:11434
    QDRANT_URL: # system provided
    BEDROCK_MODEL_ID: us.anthropic.claude-sonnet-4-6
    BEDROCK_MODEL_PROVIDER: anthropic
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      labels:
        release: # system provided
  config:
    juiceFsSecretName: "juicefs-s3-gateway"
    juiceFsUrl: "" # system provided
    logLlmDebug: false
    enableDevModelOverrides: false
  livenessProbe:
    failureThreshold: 3
    initialDelaySeconds: 65
    periodSeconds: 60
    timeoutSeconds: 120
  readinessProbe:
    failureThreshold: 3
    periodSeconds: 30
    timeoutSeconds: 15
  worker:
    enabled: false


redis:
  image:
    repository: bitnamilegacy/redis
  enabled: false
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 8Gi
      storageClass: "" # Optionally set your storage class
    resourcesPreset: none
    resources:
      requests:
        cpu: 100m
        memory: 5Gi
      limits:
        cpu: 500m
        memory: 6Gi
  replica:
    replicaCount: 0
  metrics:
    image:
      repository: bitnamilegacy/redis-exporter
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: # system provided

qdrant:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: # system provided
  resources:
    requests:
      cpu: 500m
      memory: 16Gi
    limits:
      cpu: 4000m
      memory: 20Gi

juicefs-s3-gateway:
  enabled: false
  resources:
    requests:
      cpu: 200m
      memory: 768Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  secret:
    name: "juicefs-s3-gateway"
    create: true
    config:
      name: "juicefs-volume"
      storage: "" # user provided
      bucket: "" # user provided
      metaurl: "" # system provided
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: # system provided
  configMap:
    webhookEndpoint: # user provided
  persistence:
    enabled: true
  sidecar:
    enabled: true
    keepRunning: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    mcCommands:
      - mc --config-dir /tmp/.mc event remove --force jfs/${BUCKET_NAME}
  fuse:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 512Mi
    securityContext:
      privileged: true
      runAsGroup: 0
      runAsNonRoot: false
      runAsUser: 0
      seccompProfile:
        type: Unconfined

nh-pai-data-service:
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  image:
    tag: "v1.107.0"
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      kubernetes.io/ingress.class: nginx
      kubernetes.io/tls-acme: "true"
      nginx.ingress.kubernetes.io/backend-protocol: http
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/tls-acme: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: 100m
    hosts:
      - host: # system provided
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: nh-pai-data-service-tls
        hosts: # system provided
  enabled: false
  config:
    postgresDatabase: "pai-data-rest-service"
    juiceFsSecretName: "juicefs-s3-gateway"
    juiceFsUrl: "" # system provided
    feedbackEmail:
      enabled: "true"
      recipients: "feedback@nethopper.io"
      customerName: "Not Provided!" # user provided
  autoRunMigrations: "true"
  livenessProbe:
    failureThreshold: 3
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 60
    successThreshold: 1
    timeoutSeconds: 15
  readinessProbe:
    failureThreshold: 3
    httpGet:
      path: /health
      port: http
    periodSeconds: 30
    successThreshold: 1
    timeoutSeconds: 10
  worker:
    enabled: false
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

nh-mcp-server:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 192Mi
    limits:
      cpu: 200m
      memory: 512Mi
  image:
    tag: "v1.107.2"

nh-data-ingestion:
  enabled: true
  api:
    env:
      LLAMAINDEX_OLLAMA_BASE_URL: "http://open-webui-ollama:11434"
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 512Mi
    image:
      tag: "v1.107.0"
  flower:
    resources:
      requests:
        cpu: 10m
        memory: 192Mi
      limits:
        cpu: 200m
        memory: 512Mi
    image:
      tag: "v1.107.0"
  scheduler:
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    image:
      tag: "v1.107.0"
  worker:
    resources:
      requests:
        cpu: 50m
        memory: 1Gi
      limits:
        cpu: 500m
        memory: 3Gi
    image:
      tag: "v1.107.0"
  embedWorker:
    resources:
      requests:
        cpu: 50m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    image:
      tag: "v1.107.0"
    env:
      LLAMAINDEX_OLLAMA_BASE_URL: "http://open-webui-ollama:11434"
      OPEN_WEBUI_URL: "http://open-webui"
      QDRANT_URL: # system provided
      QDRANT_COLLECTION: # user provided

# Pipeline provisioning configuration
# Pipeline .py files are copied from the private repo (nethopper2/nh-rag-embedding)
# into the pipelines/ directory during CI/CD build, before helm package.
# Only pipelines with enabled: true are included in the ConfigMap and deployed.
pipelinesProvisioning:
  enabled: true
  pipelines:
    pipeline-agent-rag:
      enabled: true
    pipeline-dev-only-model-compare:
      enabled: false
    pipeline-token-replacer:
      enabled: false
    private-supervisor-pipeline:
      enabled: true

heartbeatMonitoring:
  enabled: false  # Disabled by default
  schedule: "* * * * *"  # Every minute
  
  image:
    repository: curlimages/curl
    tag: "8.5.0"
  
  # Health check settings
  timeout: 10  # seconds for health check
  retries: 3   # number of retry attempts
  retryDelay: 5  # seconds between retries
  insecureSkipVerify: false  # Set to true to ignore SSL certificate validation for all service health checks
  
  # Built-in services (URLs auto-resolved from release name)
  builtInServices:
    openWebui:
      enabled: true
      healthPath: "/health"
      heartbeatUrl: ""  # UptimeRobot heartbeat URL
    dataService:
      enabled: true
      healthPath: "/health"
      heartbeatUrl: ""  # UptimeRobot heartbeat URL
  
  # Additional services to monitor
  services: []
  # - name: my-custom-service
  #   url: "http://my-service:8080"
  #   healthPath: "/health"
  #   heartbeatUrl: "https://heartbeat.uptimerobot.com/xxx"
  
  # Schedule on GPU-tainted nodes by default
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

  # Optional: reference external secret for heartbeat URLs (overrides inline values)
  externalSecretRef: ""
