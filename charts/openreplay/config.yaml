metadata:
  slug: openreplay
  name: OpenReplay
  description: Self-hosted session replay and product analytics
  categories: ['Observability']
  externalUrl: 'https://openreplay.com/'
  logoUrlDark: "https://nh-addons.s3.us-east-1.amazonaws.com/openreplay/logo.png"
  logoUrlLight: "https://nh-addons.s3.us-east-1.amazonaws.com/openreplay/logo.png"
  detailUrl: 'https://docs.openreplay.com/en/deployment/deploy-kubernetes/'
  isProduction: true
  serverSideDiff: true
  installTargets:
    hub: true
    hubRequired: true
    edge: false
    clusterMessage: Requires NGINX Ingress Controller and Cert-Manager already installed cluster-wide (install via the Ingress Warden addon). Also requires a dedicated node group labeled `nethopper.io/dedicated=tools` and tainted `nethopper.io/dedicated=tools:NoSchedule` — OpenReplay pods (apps and bundled databases) are pinned to that node group.
    infoMessage: First user to sign up becomes the admin. There is no admin seed step.

forms:
  - slug: default
    label: 'OpenReplay configuration'
    description: 'Self-hosted session replay'
    steps:
      - slug: 'details'
        variableSlugs:
          - 'adminEmail'
          - 'dedicatedNodeGroup'
        ui:
          label: 'Details'

variables:
  - slug: 'adminEmail'
    path: 'openreplay.adminEmail'
    forms: ['default']
    ui:
      type: 'text'
      label: 'Admin Email'
      placeholder: 'admin@example.com'
      validation: 'email'
  # v1: informational toggle. Hardcoded pinning in values.yaml applies to all
  # 28+ subchart pods regardless of this value (KAOPS form variables don't
  # fan out across multiple paths). To install on shared nodes, override the
  # per-component nodeSelector/tolerations via Helm values directly.
  - slug: 'dedicatedNodeGroup'
    path: 'nodeGroup.enabled'
    forms: ['default']
    ui:
      type: 'toggle'
      label: 'Pin to dedicated node group'
      help: 'OpenReplay pods are pinned to a node group labeled nethopper.io/dedicated=tools (taint nethopper.io/dedicated=tools:NoSchedule). Create the node group before install.'
      value: true

system:
  # Domain name flows through global.domainName (read by upstream's per-app
  # Ingress templates: api, assist, chalice, frontend, http, integrations, spot).
  # The openreplay subchart's own global.domainName is duplicated for the
  # subchart-scoped reads. Both must be set to the same value.
  - path: 'global.domainName'
    value: 'openreplay.${system.hubCluster.ingressHostname}'
  - path: 'openreplay.global.domainName'
    value: 'openreplay.${system.hubCluster.ingressHostname}'

output:
  - name: OpenReplay URL
    description: 'URL to access OpenReplay (sign up the first user to claim admin)'
    value: 'https://openreplay.${system.hubCluster.ingressHostname}'
    type: 'url'
    slug: default
