# Umbrella values for the OpenReplay KAOPS addon.
#
# Top-level `global:` propagates to all subcharts (databases + openreplay).
# Upstream's openreplay subchart and its nested charts (storage, sink, chalice,
# connector, etc.) dereference many `Values.global.<key>.<sub>` paths, so each
# of those parent dicts must exist to avoid nil-pointer errors at render time.
#
# Connection details (postgresqlHost, chHost, redisHost, kafkaHost, etc.) are
# left empty in v1 and need to be filled with in-cluster service DNS once the
# bundled databases come up. See README "Verification of upstream value
# mappings" — these are the v1 follow-up TODOs.

# Pin the entire OpenReplay workload (apps + bundled databases) to a dedicated,
# tainted node group. The node group must exist before install with the label
# AND matching taint below; pods will otherwise stay Pending. The convention
# is generic ("tools") so the same node group can host other tools-class
# addons later.
#
# Anchors below (&dedicatedNodeSelector / &dedicatedTolerations) are referenced
# at every subchart-component path further down. To change the convention, edit
# these two values once.
#
# `enabled` is surfaced in the KAOPS install form as a toggle. Note: turning
# it OFF in the form does NOT remove nodeSelector/tolerations from the 28+
# subchart pods (KAOPS form variables don't fan out across paths). To install
# on shared nodes, override the per-component values directly via Helm.
nodeGroup:
  enabled: true
  podNodeSelector: &dedicatedNodeSelector
    nethopper.io/dedicated: tools
  podTolerations: &dedicatedTolerations
    - key: nethopper.io/dedicated
      operator: Equal
      value: tools
      effect: NoSchedule

global:
  # domainName is the FQDN OpenReplay is reachable at (https://<host>).
  # System-injected by KAOPS hub via config.yaml.
  domainName: ""

  # RWX shared scratch volume mounted by the databases-migrate Job (git
  # checkout of schema files at /mnt/efs) and several app pods (sink, storage,
  # chalice, etc.) for temp/cache files. Upstream does NOT auto-create this
  # PVC — by default the umbrella creates one (see `rwx:` below). To use a
  # pre-existing PVC instead, set rwx.create: false and override
  # pvcRWXName to the existing PVC name.
  pvcRWXName: openreplay-rwx
  orTmpDir: "/mnt/efs"           # mount path inside pods (informational; only used by the hostPath sentinel path)

  # All four existingSecret refs point at the bootstrap-Job-created Secret
  # (templates/bootstrap-secret-job.yaml). With these set, upstream's
  # or-secrets template skips its own render — our Secret is the single
  # source of truth.
  # Hostnames below resolve to bundled databases-subchart Services in the
  # release namespace via cluster DNS search (bare names → in-namespace).
  # Names are tied to the bundled subcharts' fullnameOverride values; only
  # change them in lockstep with charts/openreplay/charts/databases/values.yaml.
  postgresql:
    existingSecret: openreplay-shared-secrets
    existingSecretPasswordKey: postgresql-password
    postgresqlHost: postgresql
    postgresqlPort: "5432"
    postgresqlUser: postgres
    postgresqlDatabase: postgres
    postgresqlPassword: ""       # unused when existingSecret is set
  clickhouse:
    existingSecret: openreplay-shared-secrets
    existingSecretPasswordKey: clickhouse-password
    chHost: clickhouse-openreplay-clickhouse
    username: default
    password: ""                 # unused when existingSecret is set
    use_tls: false
    service:
      webPort: 8123
      dataPort: 9000
  s3:
    existingSecret: openreplay-shared-secrets
    region: us-east-1
    endpoint: http://minio:9000
    accessKey: ""                # unused when existingSecret is set
    secretKey: ""                # unused when existingSecret is set
    assetsBucket: sessions-assets
    assistRecordsBucket: assist-records
    recordingsBucket: mobs
    sourcemapsBucket: sourcemaps
    spotsBucket: spots
    vaultBucket: vault
  orAppSecrets:
    existingSecret: openreplay-shared-secrets

  redis:
    redisHost: redis-master
  kafka:
    kafkaHost: kafka
    kafkaPort: "9092"
    kafkaUseSsl: false
    replicationFactor: 1
    retentionTime: 86400
  vault:
    vaultHost: vault:8200        # see databases.vault.fullnameOverride below

  # Email (SMTP) — left disabled in v1; surface in v2 form when needed.
  email:
    emailFrom: ""
    emailHost: ""
    emailPort: ""
    emailUser: ""
    emailPassword: ""
    emailUseTls: false
    emailUseSsl: false
    emailSslCert: ""
    emailSslKey: ""

  ingress:
    controller:
      ingressClassResource:
        name: nginx
      service:
        ports:
          http: 80
          https: 443
    # Must mirror controller.service.ports above; the openreplay.domainURL
    # helper builds asset URLs as `<scheme>://<domain>:<externalPort>` and
    # only suppresses the port suffix when externalPort is "80" or "443".
    # Leaving these empty produces a trailing-colon URL like
    # `https://example.com:` which trips YAML parsing for the S3_HOST env
    # in chalice/etc. (where the value is unquoted). Default to the standard
    # ports.
    externalProxyPorts:
      http: 80
      https: 443

  connector:
    env: {}

# Chart-managed PVC (templates/rwx-pvc.yaml). Mounted by the databases-
# migrate Job (pre-install hook) and several app pods. Created as a Helm
# pre-install,pre-upgrade hook with weight -10 so it provisions before the
# migrate Job (weight -5). Hook-delete-policy is intentionally omitted so
# the PVC persists across upgrades.
#
# Defaults: ReadWriteOnce on a standard cloud disk (cheap, ~50 GiB). RWO
# means "one node" — multiple pods can share an RWO PVC if they all land
# on the same node, which is exactly what our nodeGroup pinning gives us
# while the dedicated node group has 1 node. **Switch to a true RWX
# StorageClass before scaling the dedicated pool to multiple nodes** —
# otherwise pods on different nodes won't be able to mount this PVC.
#
# RWX options when scaling out:
#   GKE Filestore Basic:      standard-rwx (enable GcpFilestoreCsiDriver addon; 1 TiB min, ~$200/mo)
#   GKE Filestore Enterprise: enterprise-rwx
#   EKS EFS:                  efs-sc (EFS CSI driver)
# Then also flip accessModes to [ReadWriteMany].
#
# To use an existing PVC instead, set `create: false` and override
# `global.pvcRWXName` above.
rwx:
  create: true
  size: 50Gi
  # MUST be a StorageClass with volumeBindingMode: Immediate. The PVC is an
  # ArgoCD PreSync hook (so it provisions before the databases-migrate Job
  # in the same phase) — PreSync hooks need to reach a "complete" state
  # before the next phase runs. SCs with WaitForFirstConsumer (the GKE CSI
  # default `standard-rwo`/`premium-rwo`) deadlock here: PVC waits for a
  # consumer Pod, consumer Pod waits for PreSync to finish, PreSync waits
  # for the PVC to bind. `standard` (legacy gce-pd provisioner, Immediate
  # binding) avoids this and works fine for the scratch use case.
  storageClassName: standard
  accessModes:
    - ReadWriteOnce

# Secret bootstrap Job (templates/bootstrap-secret-job.yaml). Creates
# `openreplay-shared-secrets` once, idempotent on subsequent syncs. See README
# "Secrets and rotation" for the lifecycle and rotation procedure.
bootstrap:
  image:
    repository: bitnamilegacy/kubectl
    tag: "1.33.4"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

databases:
  enabled: true
  # All bundled in v1. External-DB toggles deferred to v2.
  postgresql:
    enabled: true
    # Bundled chart uses old Bitnami naming (master/slave, not primary/readReplicas).
    master:
      nodeSelector: *dedicatedNodeSelector
      tolerations: *dedicatedTolerations
    slave:
      nodeSelector: *dedicatedNodeSelector
      tolerations: *dedicatedTolerations
  redis:
    enabled: true
    master:
      nodeSelector: *dedicatedNodeSelector
      tolerations: *dedicatedTolerations
    slave:
      nodeSelector: *dedicatedNodeSelector
      tolerations: *dedicatedTolerations
  clickhouse:
    enabled: true
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  kafka:
    enabled: true
    # Top-level kafka.affinity (podAntiAffinity for hostname spreading) is
    # preserved as the bundled subchart default — only narrow scheduling here.
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  minio:
    enabled: true
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  vault:
    enabled: true
    # Pin the Service name to `vault` so global.vault.vaultHost resolves the
    # same regardless of release name. Without this, hashicorp/vault's helper
    # falls back to <release-name>-vault, which would force the host to be
    # rewritten per install.
    fullnameOverride: vault
    server:
      nodeSelector: *dedicatedNodeSelector
      tolerations: *dedicatedTolerations
    injector:
      nodeSelector: *dedicatedNodeSelector
      tolerations: *dedicatedTolerations

openreplay:
  enabled: true

  # Disable upstream's bundled NGINX Ingress Controller. KAOPS clusters install
  # ingress-nginx + cert-manager cluster-wide via the `ingress-warden` addon;
  # we only want OpenReplay to *create Ingress resources*, not stand up another
  # controller + IngressClass. Per-app subcharts (api, assist, chalice,
  # frontend, http, integrations, spot) each render their own Ingress that
  # picks up the className from global.ingress.controller.ingressClassResource.name
  # ("nginx", set on the umbrella's top-level global block above) and the
  # cert-manager.io/cluster-issuer annotation hardcoded in upstream's
  # frontend/ingress-master.yaml ("letsencrypt-prod" — matches the
  # ClusterIssuer that ingress-warden ships).
  ingress-nginx:
    enabled: false

  # User-input email surfaced in the install form. Purely informational in v1
  # (no admin seed job) — OpenReplay's onboarding makes the first signup the
  # admin. Kept available so future SSO/seed work can read it.
  adminEmail: ""

  # Pin every application microservice to the dedicated node group.
  # Field shape verified against each subchart's values.yaml at chart-package
  # time (charts/openreplay/charts/openreplay/charts/<name>/values.yaml).
  alerts:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  api:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  assets:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  assist:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  assist-api:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  assist-stats:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  canvases:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  chalice:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  connector:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  db:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  ender:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  frontend:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  heuristics:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  http:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  images:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  integrations:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  sink:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  sourcemapreader:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  spot:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  storage:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
  utilities:
    nodeSelector: *dedicatedNodeSelector
    tolerations: *dedicatedTolerations
