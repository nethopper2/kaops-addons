{{- /*
openreplay-shared-secrets bootstrap Job.

Why this exists:
  Upstream OpenReplay's official install model preprocesses vars.yaml externally
  to materialize randomness (the `{{ "{{" }} randAlphaNum 20 {{ "}}" }}` placeholders in
  upstream vars.yaml are NOT Helm template syntax — they're literal strings their
  installer scripts substitute before invoking helm). KAOPS installs through
  ArgoCD with no preprocessing step, so secret materialization has to happen at
  install time inside the chart.

What it does:
  Idempotently creates the `openreplay-shared-secrets` Secret in this release's
  namespace with the 11 keys upstream's `openreplay.secrets` helper expects
  (postgresql-password, clickhouse-password, access-key, secret-key, assist-key,
  assist-jwt-secret, jwt-secret, jwt-spot-secret, token-secret, jwt-refresh-secret,
  jwt-spot-refresh-secret). If the Secret already exists, the Job exits 0 without
  touching it — passwords are stable across syncs.

Lifecycle:
  - helm.sh/hook: pre-install,pre-upgrade  (Helm path)
  - argocd.argoproj.io/hook: PreSync       (ArgoCD path)
  - delete-policy HookSucceeded,BeforeHookCreation: cleanup after success;
    re-create on next sync (idempotent).
  - sync-wave 0 / hook-weight 0: runs after RBAC (-5) but before chart resources.

Rotation:
  kubectl delete secret openreplay-shared-secrets -n <namespace>
  argocd app sync <app>          # or: helm upgrade
  Next sync re-runs this Job, sees the Secret missing, generates fresh values.
  All consumers (DBs, app pods) will need a restart to pick up new credentials —
  delete their pods after the Secret is regenerated.
*/ -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: openreplay-secret-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openreplay.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "openreplay.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: secret-bootstrap
    spec:
      serviceAccountName: openreplay-secret-bootstrap
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: "{{ .Values.bootstrap.image.repository }}:{{ .Values.bootstrap.image.tag }}"
          imagePullPolicy: {{ .Values.bootstrap.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SECRET_NAME
              value: openreplay-shared-secrets
          command: ["/bin/sh", "-eu", "-c"]
          args:
            - |
              if kubectl get secret "$SECRET_NAME" -n "$NAMESPACE" >/dev/null 2>&1; then
                echo "Secret $SECRET_NAME already exists; nothing to do."
                exit 0
              fi
              echo "Generating $SECRET_NAME in $NAMESPACE..."
              gen() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom | head -c "$1"; }
              kubectl create secret generic "$SECRET_NAME" -n "$NAMESPACE" \
                --from-literal=postgresql-password="$(gen 20)" \
                --from-literal=clickhouse-password="$(gen 20)" \
                --from-literal=access-key="$(gen 20)" \
                --from-literal=secret-key="$(gen 40)" \
                --from-literal=assist-key="$(gen 32)" \
                --from-literal=assist-jwt-secret="$(gen 64)" \
                --from-literal=jwt-secret="$(gen 64)" \
                --from-literal=jwt-spot-secret="$(gen 64)" \
                --from-literal=token-secret="$(gen 64)" \
                --from-literal=jwt-refresh-secret="$(gen 64)" \
                --from-literal=jwt-spot-refresh-secret="$(gen 64)"
              echo "Secret $SECRET_NAME created."
          resources:
            {{- toYaml .Values.bootstrap.resources | nindent 12 }}
