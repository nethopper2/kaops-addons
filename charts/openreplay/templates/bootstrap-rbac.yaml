{{- /*
RBAC for the secret-bootstrap Job (templates/bootstrap-secret-job.yaml).
Scoped to secrets get+create in Release.Namespace only.

Lifecycle: created as helm pre-install/pre-upgrade and argocd PreSync hooks
with HookSucceeded delete-policy, so they exist only while the bootstrap Job
runs. sync-wave -5 (and Helm hook-weight -5) ensures these are applied before
the Job (sync-wave 0).
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openreplay-secret-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openreplay.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openreplay-secret-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openreplay.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-5"
rules:
  # `resourceNames` cannot constrain the `create` verb — Kubernetes RBAC
  # authorizes create requests before the resource name is known, so any
  # rule that lists both `create` and `resourceNames` denies all creates.
  # The bootstrap script is hard-coded to one Secret name, the SA exists
  # only during the PreSync window, and the namespace is dedicated to
  # this addon, so unrestricted get/create on Secrets here is fine.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openreplay-secret-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openreplay.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openreplay-secret-bootstrap
subjects:
  - kind: ServiceAccount
    name: openreplay-secret-bootstrap
    namespace: {{ .Release.Namespace }}
