nh-ai-benchmark:
  enabled: true

  image:
    tag: "v1.115.0"
    pullPolicy: IfNotPresent

  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      kubernetes.io/ingress.class: nginx
      kubernetes.io/tls-acme: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"

  ui:
    enabled: true
    image:
      tag: "v1.115.0"
      pullPolicy: IfNotPresent
    benchApiHost: "" # system provided
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        kubernetes.io/ingress.class: nginx
        kubernetes.io/tls-acme: "true"
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        nginx.ingress.kubernetes.io/ssl-redirect: "true"

  # -- List of Kubernetes secret names to mount via envFrom.
  # Each secret's keys are injected as env var names, values as env var values.
  # envFromSecrets: # these will be set while installing the addon
  #   - nh-ai-benchmark-secrets
  #   - aws-open-ai-api-key-nethopper

  env:
    # Populated via system section in config.yaml
    OI_BASE_URL: ""
    RAG_BASE_URL: ""
    PIPELINES_BASE_URL: ""
    MCP_BASE_URL: ""
    QDRANT_URL: ""
    QDRANT_COLLECTION: ""
    # Populated via form variables in config.yaml
    OPEN_WEBUI_UID: ""
    DEFAULT_MODEL: ""
    # Defaults — override in values if needed
    BEDROCK_REGION: "us-east-1"
    BEDROCK_EMBEDDINGS_MODEL: "amazon.titan-embed-text-v2:0"
    CLAUDE_MODEL_ID: "us.anthropic.claude-sonnet-4-6"
